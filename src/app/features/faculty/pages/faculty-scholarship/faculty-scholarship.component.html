<div class="p-4">
  <div class="d-flex justify-content-between">
    <h2 class="mb-3">Scholarships</h2>
    <button mat-raised-button color="primary" (click)="openDialog()">
      Add Scholarship
    </button>
  </div>

  <div class="row">
    <div
      class="col-lg-4 col-md-6 mb-5"
      *ngFor="let scholarship of scholarships"
    >
      <mat-card class="p-3" appearance="outlined">
        <mat-card-header class="mb-3 border-bottom">
          <mat-card-title
            ><h5>{{ scholarship.title }}</h5></mat-card-title
          >
          <mat-card-subtitle>{{ scholarship.creationDate }}</mat-card-subtitle>
        </mat-card-header>
        <iframe
          [src]="getGoogleViewerUrl(scholarship.fileUrl)"
          width="100%"
          height="200"
        >
        </iframe>
        <mat-card-content
          class="py-3 text-truncate"
          [matTooltip]="scholarship.descripton"
        >
          {{ scholarship.description }}
        </mat-card-content>
        <mat-card-actions>
          <button
            (click)="download(scholarship.fileUrl)"
            class="action-button border-0"
          >
            Download
          </button>

          <small class="m-2 text-black-50" *ngIf="scholarship.deadline"
            >Apply By {{ scholarship.deadline }}</small
          >
        </mat-card-actions>
      </mat-card>
    </div>
  </div>
</div>
