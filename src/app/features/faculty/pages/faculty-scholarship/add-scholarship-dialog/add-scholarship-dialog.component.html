<h5 class="p-3 border-bottom">Add New Scholarship</h5>
<mat-dialog-content>
  <p>Upload Scholarship Document</p>
  <form [formGroup]="scholarshipForm">
    <div class="mb-3">
      <label class="mb-2">Title</label>
      <input type="text" formControlName="title" class="form-control" />
    </div>

    <div class="mb-3">
      <label class="mb-2">Description</label>
      <textarea
        maxlength="250"
        formControlName="description"
        class="form-control"
      ></textarea>
      <small
        class="text-danger"
        *ngIf="scholarshipForm.get('description')?.hasError('maxlength')"
      >
        Maximum 255 characters allowed.
      </small>
    </div>

    <div class="mb-3">
      <label class="mb-2">Deadline</label>
      <input type="date" formControlName="deadline" class="form-control" />
    </div>

    <div class="mb-3">
      <label class="mb-2">Upload PDF</label>
      <input
        #fileInput
        type="file"
        (change)="onFileSelected($event, fileInput)"
        accept="application/pdf"
        class="form-control"
      />
    </div>

    <div class="justify-content-end">
      <button
        class="action-button border-0 bg-transparent"
        mat-button
        (click)="onClose()"
      >
        Cancel
      </button>
      <button
        class="action-button border-0 bg-transparent"
        mat-raised-button
        color="primary"
        type="submit"
        (click)="submitScholarship()"
      >
        Submit
      </button>
    </div>
  </form>
</mat-dialog-content>
